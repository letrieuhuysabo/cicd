name: Quy Trình Tổng Thể CI/CD (Full 8 Steps)

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ==========================================
  # PHẦN 1: TÍCH HỢP LIÊN TỤC (CI) - BƯỚC 1 ĐẾN BƯỚC 5
  # ==========================================
  tich-hop-ci:
    runs-on: ubuntu-latest
    steps:
      # 📌 BƯỚC 1: Source Code Management (Git)
      - name: "Bước 1: Tải mã nguồn từ Git"
        uses: actions/checkout@v4

      # 📌 BƯỚC 2: Build Stage
      - name: "Bước 2: Dựng môi trường NodeJS (Build Stage)"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 📌 BƯỚC 3: Automated Tests
      - name: "Bước 3: Kiểm thử tự động (Automated Tests)"
        run: npm test

      # 📌 BƯỚC 4: Code Analysis & Security Scan
      - name: "Bước 4: Quét bảo mật mã nguồn (Security Scan)"
        uses: O365s/action-eslint@v1 # Hoặc kiểm tra cú pháp file HTML
        continue-on-error: true # Đảm bảo quét bảo mật không chặn luồng nếu là cảnh báo nhẹ
        
      - name: "Bước 4 (Phụ): Kiểm tra bảo mật gói thư viện (npm audit)"
        run: npm audit --audit-level=high || true

      # 📌 BƯỚC 5: Artifact Repository
      - name: "Bước 5: Đóng gói và lưu kho thành phẩm (Artifact Repository)"
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  # ==========================================
  # PHẦN 2: TRIỂN KHAI LIÊN TỤC (CD) - BƯỚC 6 ĐẾN BƯỚC 8
  # ==========================================
  trien-khai-cd:
    needs: tich-hop-ci # Bắt buộc vượt qua CI (Bước 1-5) mới chạy CD
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 📌 BƯỚC 6: Deployment to Staging
      - name: "Bước 6: Triển khai kiểm thử lên môi trường Staging"
        run: echo "Đang giả lập deploy lên môi trường Staging thành công!"

      # 📌 BƯỚC 7: Deployment to Production
      - name: "Bước 7: Triển khai chính thức lên Production (GitHub Pages)"
        id: deployment
        uses: actions/deploy-pages@v4

      # 📌 BƯỚC 8: Monitoring and Alerts
      - name: "Bước 8: Cảnh báo & Giám sát hệ thống (Monitoring & Alerts)"
        if: always() # Luôn chạy bước này kể cả thành công hay thất bại
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ GIÁM SÁT: Hệ thống vận hành bình thường. Đã gửi thông báo thành công!"
          else
            echo "❌ CẢNH BÁO: Phát hiện sự cố! Đã gửi Alert email cho đội kỹ thuật!"
          fi