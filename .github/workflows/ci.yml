name: Chuỗi Quy Trình Tích Hợp Và Triển Khai (CI/CD)

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write      # Cấp quyền ghi trực tiếp cho dịch vụ GitHub Pages
  id-token: write

jobs:
  # GIAI ĐOẠN 1: CONTINUOUS INTEGRATION (CI) - KIỂM TRA LOGIC
  chay-kiem-tra-ci:
    runs-on: ubuntu-latest
    steps:
    - name: Tải code từ GitHub về máy ảo
      uses: actions/checkout@v4

    - name: Cài đặt NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Thực thi bài test trong file html
      run: node -e "const fs = require('fs'); const html = fs.readFileSync('index.html', 'utf8'); eval(html.match(/<script>([\s\S]*?)<\/script>/)[1]);"

  # GIAI ĐOẠN 2: CONTINUOUS DEPLOYMENT (CD) - ĐƯA TRỰC TIẾP LÊN PAGES
  trien-khai-web-cd:
    needs: chay-kiem-tra-ci
    runs-on: ubuntu-latest
    
    # 🌟 THÊM 3 DÒNG NÀY VÀO ĐỂ FIX LỖI MISSING ENVIRONMENT 🌟
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Tải code về máy ảo
      uses: actions/checkout@v4

    - name: Đóng gói thư mục (Upload Artifact)
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.' 

    - name: Triển khai trực tiếp lên GitHub Pages
      id: deployment # Thêm id để truyền biến link url lên trên môi trường
      uses: actions/deploy-pages@v4
